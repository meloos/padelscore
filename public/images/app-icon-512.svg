<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" fill="#0f1923"/>

  <!-- Subtle court cross lines -->
  <line x1="256" y1="60" x2="256" y2="452" stroke="#1e3a2f" stroke-width="1.5"/>
  <line x1="60" y1="256" x2="452" y2="256" stroke="#1e3a2f" stroke-width="1.5"/>

  <!-- Outer court rect faint -->
  <rect x="60" y="60" width="392" height="392" rx="4" fill="none" stroke="#1e3a2f" stroke-width="1.2"/>

  <!-- Hexagon mark -->
  <polygon points="256,80 356,138 356,252 256,310 156,252 156,138" fill="#22c55e"/>

  <!-- Padel racket silhouette (simple) inside hex — just a P for now -->
  <text x="256" y="195" text-anchor="middle" dominant-baseline="central" font-family="Georgia, serif" font-size="148" font-weight="700" fill="#0f1923">P</text>

  <!-- App name below -->
  <text x="256" y="390" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700" fill="#f8fafc">PadelScore</text>
  <text x="256" y="430" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="14" fill="#64748b" letter-spacing="2">PADEL</text>
</svg>
