<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <clipPath id="clip">
      <rect width="1200" height="630"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0f1923"/>

  <!-- Court lines (subtle) -->
  <g stroke="#1e3a2f" stroke-width="1.5" fill="none">
    <!-- outer -->
    <rect x="60" y="60" width="1080" height="510" rx="4"/>
    <!-- service box line vertical -->
    <line x1="600" y1="60" x2="600" y2="570"/>
    <!-- service boxes horizontal -->
    <line x1="60" y1="220" x2="1140" y2="220"/>
    <line x1="60" y1="410" x2="1140" y2="410"/>
    <!-- net -->
    <line x1="60" y1="315" x2="1140" y2="315" stroke="#2a5c40" stroke-width="2.5"/>
  </g>

  <!-- Decorative circle accent (ball) -->
  <circle cx="980" cy="140" r="200" fill="none" stroke="#1e3a2f" stroke-width="1"/>
  <circle cx="980" cy="140" r="160" fill="none" stroke="#1e3a2f" stroke-width="0.8"/>

  <!-- Green accent bar left -->
  <rect x="60" y="270" width="8" height="90" rx="4" fill="#22c55e"/>

  <!-- App icon mark (P hexagon) -->
  <g transform="translate(168, 245)">
    <!-- Hexagon bg -->
    <polygon points="60,0 120,34 120,103 60,137 0,103 0,34" fill="#22c55e"/>
    <!-- P letter -->
    <text x="60" y="68.5" text-anchor="middle" dominant-baseline="central" font-family="Georgia, serif" font-size="88" font-weight="700" fill="#0f1923">P</text>
  </g>

  <!-- Text block -->
  <text x="340" y="290" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="#f8fafc" letter-spacing="-1">PadelScore</text>
  <text x="343" y="348" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="26" fill="#94a3b8" letter-spacing="3">PADEL TOURNAMENT TRACKER</text>

  <!-- Tagline -->
  <text x="343" y="430" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="22" fill="#64748b">Create · Pair · Score · Rank</text>

  <!-- URL -->
  <text x="343" y="530" font-family="'SF Mono', 'Courier New', monospace" font-size="18" fill="#334155">padelscore.home.melek.solutions</text>

  <!-- Green underline accent -->
  <rect x="340" y="360" width="540" height="3" rx="1.5" fill="#22c55e" opacity="0.4"/>
</svg>
