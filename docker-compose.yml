services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: padelscore
      POSTGRES_USER: padel
      POSTGRES_PASSWORD: "change-me"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U padel -d padelscore"]
      interval: 5s
      timeout: 5s
      retries: 10

  padelscore:
    # Local build — comment out 'build' and uncomment 'image' to pull from GHCR
    build: .
    # image: ghcr.io/meloos/padelscore:latest

    ports:
      - "3000:3000"

    depends_on:
      db:
        condition: service_healthy

    environment:
      DATABASE_URL: "postgresql://padel:change-me@db:5432/padelscore"
      # Generate with: openssl rand -base64 32
      AUTH_SECRET: "change-me-before-production"
      # First account registered with this email gets admin rights
      ADMIN_EMAIL: "admin@example.com"

    restart: unless-stopped

volumes:
  postgres-data:
